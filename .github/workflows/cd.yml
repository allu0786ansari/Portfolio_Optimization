name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            latest

      - name: Create dummy .env
        run: |
          echo "API_KEY=placeholder" > .env
          echo "START_DATE=2019-01-01" >> .env
          echo "END_DATE=2024-12-31" >> .env

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: serving/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio-api" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY