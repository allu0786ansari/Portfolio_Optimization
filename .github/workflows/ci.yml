name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest pytest-cov
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install prometheus-client
          pip install "pandas<3"
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --select E,F,I --ignore E501

      - name: Run unit tests (no data required)
        run: |
          pytest tests/test_data_pipeline.py \
                 tests/test_forecasting.py \
                 tests/test_env.py \
                 tests/test_agent.py \
                 tests/test_backtesting.py \
                 tests/test_monitoring.py \
                 -v --tb=short
        env:
          PYTHONPATH: .

      - name: Run API integration tests (mocked)
        run: pytest tests/test_api.py -v --tb=short
        env:
          PYTHONPATH: .
          API_KEY: test-key

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env
        run: |
          echo "API_KEY=ci-test-key" > .env
          echo "START_DATE=2019-01-01" >> .env
          echo "END_DATE=2024-12-31" >> .env
          echo "RAW_DATA_DIR=data/raw" >> .env
          echo "PROCESSED_DATA_DIR=data/processed" >> .env

      - name: Create dummy data dirs
        run: |
          mkdir -p data/raw data/processed
          mkdir -p backtesting
          echo "{}" > backtesting/backtest_results.json
          mkdir -p models/rl_agent/saved_models

      - name: Build API Docker image
        run: docker build -f serving/Dockerfile -t portfolio-api:ci .

      - name: Verify image exists
        run: docker images portfolio-api:ci

      - name: Smoke test — container health endpoint
        run: |
          docker run -d --name test-api \
            -e API_KEY=test-key \
            -e MLFLOW_TRACKING_URI=http://localhost:5000 \
            -p 8000:8000 \
            portfolio-api:ci

          echo "Waiting for API to be ready..."
          for i in $(seq 1 12); do
            sleep 8
            echo "Attempt $i of 12..."
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed!"
              docker stop test-api
              exit 0
            fi
          done

          echo "API failed to start after 60 seconds"
          docker logs test-api
          docker stop test-api || true
          exit 1