services:

  mlflow:
    image: python:3.11-slim-bullseye
    container_name: portfolio-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
      - ./mlflow.db:/mlflow.db
    command: >
      bash -c "pip install mlflow[extras] --quiet &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow.db
      --default-artifact-root /mlartifacts
      --serve-artifacts
      --allowed-hosts '*'"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: portfolio-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlartifacts:/app/mlartifacts
      - ./mlflow.db:/app/mlflow.db
      - ./models/rl_agent/saved_models:/app/models/rl_agent/saved_models
      - ./data:/app/data
      - ./backtesting/backtest_results.json:/app/backtesting/backtest_results.json
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: portfolio-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./backtesting/backtest_results.json:/app/backtesting/backtest_results.json
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: portfolio-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./mlops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: portfolio-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

   # ── Airflow — lightweight orchestrator ──────────────────────────
  # Uses custom minimal image — NO torch, NO SB3, NO ML stack
  # Training is delegated to the FastAPI service via HTTP

  airflow-init:
    build:
      context: .
      dockerfile: mlops/airflow/Dockerfile
    container_name: portfolio-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname AI \
          --lastname Engineer \
          --role Admin \
          --email admin@example.com || true
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=portfolio_secret_key_2024
      - TRAINING_SERVICE_URL=http://api:8000
      - TRAINING_SERVICE_API_KEY=portfolio-secret-key-change-in-production
    volumes:
      - airflow_db:/opt/airflow
      - ./mlops/airflow/dags:/opt/airflow/dags
    depends_on:
      - mlflow
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: mlops/airflow/Dockerfile
    container_name: portfolio-airflow-webserver
    ports:
      - "8080:8080"
    command: airflow webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=portfolio_secret_key_2024
      - TRAINING_SERVICE_URL=http://api:8000
      - TRAINING_SERVICE_API_KEY=portfolio-secret-key-change-in-production
    volumes:
      - airflow_db:/opt/airflow
      - ./mlops/airflow/dags:/opt/airflow/dags
    depends_on:
      - airflow-init
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: mlops/airflow/Dockerfile
    container_name: portfolio-airflow-scheduler
    command: airflow scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=portfolio_secret_key_2024
      - TRAINING_SERVICE_URL=http://api:8000
      - TRAINING_SERVICE_API_KEY=portfolio-secret-key-change-in-production
    volumes:
      - airflow_db:/opt/airflow
      - ./mlops/airflow/dags:/opt/airflow/dags
    depends_on:
      - airflow-init
      - api
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  airflow_db: